# localization: en - english, ru - russian
locale: ru

# player attribute update interval (in ticks, 20 ticks = 1 second)
attribute-update-interval: 40

# particle update interval (in ticks)
particle-update-interval: 10

# true - effects work on any trim, false - effects work only on trims that were issued via the commands /mte give
effects-work-on-all-templates: true

# true - the effects work in parts (1 piece of armor with a trim is equipped = 25% of the effect), false - the effects work only if a full set of armor with a trim is equipped
scale-effects-by-pieces: true

trims:
  COAST:
    enabled: true
    display-name: "&#00AAFF⚓ Coast"
    lore:
      - ""
      - "&#00AAFF+1 to luck"
      - ""
